<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tuamah AI Portfolio V3</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f19;
  color:#e6edf3;
}

nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(10,14,25,0.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1f2937;
}

nav a{
  color:#e6edf3;
  margin:0 10px;
  text-decoration:none;
}

.hero{
  padding:140px 20px 60px;
  text-align:center;
}

h1{font-size:52px;margin:0;}
h2{color:#58a6ff;}

.section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#111827;
  padding:20px;
  margin:15px 0;
  border-radius:14px;
  border:1px solid #1f2937;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  margin:5px;
  background:#238636;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App(){
  return (
    <div>

      <nav>
        <div><b>Tuamah AI</b></div>
        <div>
          <a href="#about">About</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
        </div>
      </nav>

      <div className="hero">
        <h1>Tuamah Mahmood Hamzah</h1>
        <h2>AI / ML Engineer</h2>
        <p>Agentic AI • Computer Vision • OCR • Kaggle • Cloud AI</p>
      </div>

      <div className="section" id="about">
        <h2>About</h2>
        <div className="card">
          AI Engineer specializing in ML systems, computer vision, OCR automation and Agentic AI workflows.
        </div>
      </div>

      <div className="section" id="skills">
        <h2>Skills</h2>
        <div className="card">
          <span className="badge">Python</span>
          <span className="badge">CatBoost</span>
          <span className="badge">OpenCV</span>
          <span className="badge">OCR</span>
          <span className="badge">Agentic AI</span>
          <span className="badge">Google Cloud</span>
        </div>
      </div>

      <div className="section" id="projects">
        <h2>Projects</h2>
        <div className="grid">
          <div className="card">FRAI V1.3 Face Recognition System</div>
          <div className="card">Iraqi ID OCR Automation System</div>
          <div className="card">Telecom Churn Prediction (GCI 2026)</div>
          <div className="card">NFL Draft Prediction</div>
          <div className="card">Silent Rescuer AI</div>
        </div>
      </div>

      <div className="section" id="contact">
        <h2>Contact</h2>
        <div className="card">
          <p>Email: t.ft749@gmail.com</p>
          <p>GitHub: github.com/tuamah</p>
          <p>LinkedIn: linkedin.com/in/tuamah</p>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
